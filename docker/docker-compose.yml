# Aether — Docker Compose
#
# Core services: Caddy, Postgres, Orchestrator-Go, Dashboard.
# Agent containers are provisioned dynamically per user by the orchestrator.
#
# Usage:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.override.yml up --build
#   docker compose -f docker/docker-compose.yml up --build
#
# The agent image should be available locally or in a registry:
#   docker build -t suryaumapathy2812/aether-agent:latest ./agent

services:
  # --- Caddy (reverse proxy + auto-HTTPS) ---
  caddy:
    image: caddy:2-alpine
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ../docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
      - orchestrator
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    restart: unless-stopped

  # --- Postgres (shared by dashboard + orchestrator) ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aether
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aether_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  # --- MinIO (S3-compatible storage for media uploads) ---
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: stop-first
      rollback_config:
        order: stop-first

  # --- Orchestrator (Go) ---
  orchestrator:
    build: ../orchestrator
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://aether:${POSTGRES_PASSWORD:-aether_dev}@postgres:5432/aether
      - AGENT_SECRET=${AGENT_SECRET:-}
      - AGENT_IMAGE=${AGENT_IMAGE:-suryaumapathy2812/aether-agent:latest}
      - AGENT_NETWORK=${AGENT_NETWORK:-}
      - AGENT_IDLE_TIMEOUT=${AGENT_IDLE_TIMEOUT:-1800}
      - AGENT_HEALTH_TIMEOUT=${AGENT_HEALTH_TIMEOUT:-30}
      - AGENT_PORT=${AGENT_PORT:-8000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - AGENT_STATE_KEY=${AGENT_STATE_KEY:-}
      - AGENT_ASSETS_ROOT=${AGENT_ASSETS_ROOT:-/var/lib/aether/agents}
      - AGENT_UPDATE_REPO=${AGENT_UPDATE_REPO:-suryaumapathy2812/aether}
      - AGENT_UPDATE_TOKEN=${AGENT_UPDATE_TOKEN:-}
      - AETHER_AUTO_ASSIGN_FIRST_AGENT=${AETHER_AUTO_ASSIGN_FIRST_AGENT:-true}
      - AETHER_DEFAULT_AGENT_ID=${AETHER_DEFAULT_AGENT_ID:-}
      # VAPID keys for web push notifications
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-}
      # S3/MinIO media storage — forwarded to agent containers
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_BUCKET_TEMPLATE=${S3_BUCKET_TEMPLATE:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL:-}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-}
      - S3_PUT_URL_TTL_SECONDS=${S3_PUT_URL_TTL_SECONDS:-300}
      - S3_GET_URL_TTL_SECONDS=${S3_GET_URL_TTL_SECONDS:-900}
      # OAuth provider credentials — forwarded to agent containers for env-backed plugin auth.
      # Add new providers here (e.g. GITHUB_CLIENT_ID) and set them in .env.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/aether/agents:/var/lib/aether/agents
    restart: unless-stopped

  # --- Dashboard (Next.js) ---
  dashboard:
    build: ../dashboard
    environment:
      - DATABASE_URL=postgresql://aether:${POSTGRES_PASSWORD:-aether_dev}@postgres:5432/aether
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://${DOMAIN:-localhost}
      - BETTER_AUTH_TRUSTED_ORIGINS=${BETTER_AUTH_TRUSTED_ORIGINS:-}
      - AGENT_BASE_URL=http://orchestrator:4000
      - NEXT_PUBLIC_ORCHESTRATOR_URL=${NEXT_PUBLIC_ORCHESTRATOR_URL:-http://localhost:3080}
      - NEXT_PUBLIC_ORCHESTRATOR_WS_URL=${NEXT_PUBLIC_ORCHESTRATOR_WS_URL:-ws://localhost:3080}
    depends_on:
      postgres:
        condition: service_healthy
      orchestrator:
        condition: service_started
    restart: unless-stopped

  # --- Aether Agent ---
  # Agent containers are provisioned dynamically per user by the orchestrator
  # via Docker SDK. No static agent service here.
  # The agent image must be pre-built: docker build -t core-ai-agent:latest ./agent

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  minio_data:
  # Per-user volumes (aether-memory-{user_id}, aether-workspace-{user_id})
  # are created dynamically by the orchestrator's agent_manager.
