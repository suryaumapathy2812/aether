# Dev overrides for docker/docker-compose.yml.
#
# Adds hot-reload volume mounts and dev server commands.
# To run production without these overrides:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.override.yml up --build
#
# Agent containers are provisioned on-demand per user.

services:
  caddy:
    ports:
      - "3000:3000"
      - "3080:3080"
    environment:
      - DOMAIN=localhost:3000

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  postgres:
    ports:
      - "5432:5432"

  orchestrator:
    volumes:
      - ../orchestrator:/app
    command: go run ./cmd/server

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile.dev
    volumes:
      - ../dashboard/src:/app/src
      - ../dashboard/public:/app/public
