# Aether Services - Docker Containers
#
# Services: Postgres, MinIO, Dozzle (log viewer)
#
# Usage:
#   docker compose -f docker-compose.services.yml up -d
#
# Environment:
#   Copy .env.template to .env and fill in values

services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:16-alpine
    container_name: aether-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aether}
      POSTGRES_USER: ${POSTGRES_USER:-aether}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aether_internal
    restart: unless-stopped
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aether}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MinIO (S3-compatible storage) ---
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: aether-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      MINIO_SERVER_URL: https://s3.aether.suryaumapathy.in
      MINIO_BROWSER_REDIRECT_URL: https://minio.aether.suryaumapathy.in
    volumes:
      - minio_data:/data
    networks:
      - aether_internal
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"

  # --- Dozzle (Log Viewer) ---
  dozzle:
    image: amir20/dozzle:latest
    container_name: aether-dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOZZLE_HOSTNAME: aether
      DOZZLE_FILTER: "name=aether*"
    networks:
      - aether_internal
    restart: unless-stopped
    ports:
      - "${DOZZLE_PORT:-8080}:8080"

networks:
  aether_internal:
    name: aether_internal
    driver: bridge
    attachable: true

volumes:
  postgres_data:
    name: aether_postgres_data
  minio_data:
    name: aether_minio_data
