# Aether Production - Docker Compose
#
# Usage:
#   Deploy as a stack in Portainer with external Traefik
#   docker stack deploy -c docker/docker-compose.prod.yml aether
#
# Prerequisites:
#   1. Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets in GitHub
#   2. Run GitHub workflows to build and push images to Docker Hub
#   3. Update environment variables in Portainer or .env file
#   4. Traefik labels are included for Portainer's Traefik to auto-discover

services:
  # --- Postgres (shared by dashboard + orchestrator) ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aether
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aether_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: stop-first
      rollback_config:
        order: stop-first

  # --- MinIO (S3-compatible storage for media uploads) ---
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    networks:
      - aether_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: stop-first
      rollback_config:
        order: stop-first

  # --- Orchestrator (Go) ---
  orchestrator:
    image: ${DOCKERHUB_USERNAME:-yourusername}/aether-orchestrator:latest
    environment:
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - AGENT_SECRET=${AGENT_SECRET}
      - AGENT_IMAGE=${AGENT_IMAGE:-suryaumapathy2812/aether-agent:latest}
      - AGENT_NETWORK=${AGENT_NETWORK:-}
      - AGENT_IDLE_TIMEOUT=${AGENT_IDLE_TIMEOUT:-1800}
      - AGENT_HEALTH_TIMEOUT=${AGENT_HEALTH_TIMEOUT:-30}
      - AGENT_PORT=${AGENT_PORT:-8000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - AGENT_STATE_KEY=${AGENT_STATE_KEY:-}
      - AGENT_ASSETS_ROOT=${AGENT_ASSETS_ROOT:-/var/lib/aether/agents}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_BUCKET_TEMPLATE=${S3_BUCKET_TEMPLATE:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL:-}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-true}
      - S3_PUT_URL_TTL_SECONDS=${S3_PUT_URL_TTL_SECONDS:-300}
      - S3_GET_URL_TTL_SECONDS=${S3_GET_URL_TTL_SECONDS:-900}
      - AGENT_UPDATE_REPO=${AGENT_UPDATE_REPO:-suryaumapathy2812/aether}
      - AGENT_UPDATE_TOKEN=${AGENT_UPDATE_TOKEN:-}
      - AETHER_AUTO_ASSIGN_FIRST_AGENT=${AETHER_AUTO_ASSIGN_FIRST_AGENT:-true}
      - AETHER_DEFAULT_AGENT_ID=${AETHER_DEFAULT_AGENT_ID:-}
    depends_on:
      - postgres
      - minio
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/aether/agents:/var/lib/aether/agents
    networks:
      - aether_network
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
      rollback_config:
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-web}"
        - "traefik.http.routers.orchestrator.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`) && !PathPrefix(`/api/auth`) && !PathPrefix(`/api/go`)"
        - "traefik.http.routers.orchestrator.entrypoints=websecure"
        - "traefik.http.routers.orchestrator.tls=true"
        - "traefik.http.routers.orchestrator.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-suryaumapathyresolver}"
        - "traefik.http.services.orchestrator.loadbalancer.server.port=4000"
        - "traefik.http.routers.orchestrator.priority=100"

  # --- Dashboard (Next.js) ---
  dashboard:
    image: ${DOCKERHUB_USERNAME:-yourusername}/aether-dashboard:latest
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://${DOMAIN}
      - BETTER_AUTH_TRUSTED_ORIGINS=https://${DOMAIN}
      - AGENT_BASE_URL=http://orchestrator:4000
    depends_on:
      - postgres
      - orchestrator
    networks:
      - aether_network
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
      rollback_config:
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-web}"
        - "traefik.http.routers.dashboard-auth.rule=Host(`${DOMAIN}`) && PathPrefix(`/api/auth`)"
        - "traefik.http.routers.dashboard-auth.entrypoints=websecure"
        - "traefik.http.routers.dashboard-auth.tls=true"
        - "traefik.http.routers.dashboard-auth.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-suryaumapathyresolver}"
        - "traefik.http.routers.dashboard-auth.priority=200"
        - "traefik.http.routers.dashboard-auth.service=dashboard"
        - "traefik.http.routers.dashboard.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.dashboard.entrypoints=websecure"
        - "traefik.http.routers.dashboard.tls=true"
        - "traefik.http.routers.dashboard.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-suryaumapathyresolver}"
        - "traefik.http.routers.dashboard.priority=10"
        - "traefik.http.services.dashboard.loadbalancer.server.port=3000"

  # --- Aether Agent ---
  # Agent containers are provisioned dynamically per user by the orchestrator
  # via Docker SDK. No static agent service here.
  # Each provisioned user-agent gets a dedicated persistent volume mounted at
  # /app/assets (this includes the user's persistent SQLite state.db).
  # The agent image must be built and pushed to Docker Hub:
  #   docker build -t ${DOCKERHUB_USERNAME}/aether-agent:latest ./agent
  #   docker push ${DOCKERHUB_USERNAME}/aether-agent:latest

networks:
  aether_network:
    name: aether_network
    driver: overlay
    attachable: true
  traefik-public:
    external: true
    name: ${TRAEFIK_PUBLIC_NETWORK:-web}

volumes:
  postgres_data:
  minio_data:
