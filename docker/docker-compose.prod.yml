# Aether Production - Docker Compose
#
# Usage:
#   Deploy as a stack in Portainer with external Traefik
#   docker stack deploy -c docker/docker-compose.prod.yml aether
#
# Prerequisites:
#   1. Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets in GitHub
#   2. Run GitHub workflows to build and push images to Docker Hub
#   3. Update environment variables in Portainer or .env file
#   4. Traefik labels are included for Portainer's Traefik to auto-discover

services:
  # --- Postgres (shared by dashboard + orchestrator) ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aether
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aether_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: stop-first
      rollback_config:
        order: stop-first

  # --- Orchestrator (Go) ---
  orchestrator:
    image: ${DOCKERHUB_USERNAME:-yourusername}/aether-orchestrator:latest
    environment:
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - AGENT_SECRET=${AGENT_SECRET}
      - AGENT_IMAGE=${AGENT_IMAGE:-${DOCKERHUB_USERNAME:-yourusername}/aether-agent:latest}
      - AGENT_NETWORK=${AGENT_NETWORK:-aether_network}
      - AGENT_IDLE_TIMEOUT=${AGENT_IDLE_TIMEOUT:-1800}
      - AGENT_HEALTH_TIMEOUT=${AGENT_HEALTH_TIMEOUT:-30}
      - AGENT_PORT=${AGENT_PORT:-8000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - AETHER_AUTO_ASSIGN_FIRST_AGENT=${AETHER_AUTO_ASSIGN_FIRST_AGENT:-true}
      - AETHER_DEFAULT_AGENT_ID=${AETHER_DEFAULT_AGENT_ID:-}
    depends_on:
      - postgres
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - aether_network
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
      rollback_config:
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-web}"
        - "traefik.http.routers.orchestrator.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`) && !PathPrefix(`/api/auth`)"
        - "traefik.http.routers.orchestrator.entrypoints=websecure"
        - "traefik.http.routers.orchestrator.tls=true"
        - "traefik.http.routers.orchestrator.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-suryaumapathyresolver}"
        - "traefik.http.services.orchestrator.loadbalancer.server.port=4000"
        - "traefik.http.routers.orchestrator.priority=100"

  # --- Dashboard (Next.js) ---
  dashboard:
    image: ${DOCKERHUB_USERNAME:-yourusername}/aether-dashboard:latest
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://${DOMAIN}
      - BETTER_AUTH_TRUSTED_ORIGINS=https://${DOMAIN}
      - AGENT_BASE_URL=http://orchestrator:4000
      - NEXT_PUBLIC_ORCHESTRATOR_URL=
      - NEXT_PUBLIC_ORCHESTRATOR_WS_URL=
    depends_on:
      - postgres
      - orchestrator
    networks:
      - aether_network
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
      rollback_config:
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-web}"
        - "traefik.http.routers.dashboard-auth.rule=Host(`${DOMAIN}`) && PathPrefix(`/api/auth`)"
        - "traefik.http.routers.dashboard-auth.entrypoints=websecure"
        - "traefik.http.routers.dashboard-auth.tls=true"
        - "traefik.http.routers.dashboard-auth.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-suryaumapathyresolver}"
        - "traefik.http.routers.dashboard-auth.priority=200"
        - "traefik.http.routers.dashboard-auth.service=dashboard"
        - "traefik.http.routers.dashboard.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.dashboard.entrypoints=websecure"
        - "traefik.http.routers.dashboard.tls=true"
        - "traefik.http.routers.dashboard.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-suryaumapathyresolver}"
        - "traefik.http.routers.dashboard.priority=10"
        - "traefik.http.services.dashboard.loadbalancer.server.port=3000"

  # --- Aether Agent ---
  # Agent containers are provisioned dynamically per user by the orchestrator
  # via Docker SDK. No static agent service here.
  # The agent image must be built and pushed to Docker Hub:
  #   docker build -t ${DOCKERHUB_USERNAME}/aether-agent:latest ./agent
  #   docker push ${DOCKERHUB_USERNAME}/aether-agent:latest

networks:
  aether_network:
    name: aether_network
    driver: overlay
    attachable: true
  traefik-public:
    external: true
    name: ${TRAEFIK_PUBLIC_NETWORK:-web}

volumes:
  postgres_data:
