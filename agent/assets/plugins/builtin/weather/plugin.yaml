name: weather
display_name: Weather
description: Current weather and forecasts for any location
version: 1.0.0

auth:
  type: none

api:
  base_url: https://api.open-meteo.com/v1

tools:
  - name: current_weather
    description: Get current weather for a location.
    status_text: Checking weather...
    class: CurrentWeatherTool
    parameters:
      - name: location
        type: string
        description: Location name (city, region, or country)
        required: true

  - name: weather_forecast
    description: Get weather forecast for a location for up to 7 days.
    status_text: Checking forecast...
    class: ForecastTool
    parameters:
      - name: location
        type: string
        description: Location name
        required: true
      - name: days
        type: integer
        description: Forecast days (1-7)
        required: false
        default: 3
