name: gmail
display_name: Gmail
description: Gmail email service
version: 1.0.0
plugin_type: sensor
auth:
  type: oauth2
  provider: google
  token_url: https://oauth2.googleapis.com/token
  use_basic_auth: false
  auto_refresh: true
  refresh_interval: 3000
  scopes:
    - https://www.googleapis.com/auth/gmail.readonly
    - https://www.googleapis.com/auth/gmail.send
    - https://www.googleapis.com/auth/gmail.modify
  config_fields:
    - key: client_id
      label: Client ID
      type: text
      required: true
    - key: client_secret
      label: Client Secret
      type: password
      required: true
    - key: project_id
      label: Project ID
      type: text
api:
  base_url: https://gmail.googleapis.com/gmail/v1
webhook:
  protocol: pubsub
  event_field: eventType
  supported_events:
    - messageReceived
