name: google-calendar
display_name: Google Calendar
description: Google Calendar scheduling and event management
version: 1.0.0
plugin_type: sensor
auth:
  type: oauth2
  provider: google
  token_url: https://oauth2.googleapis.com/token
  use_basic_auth: false
  auto_refresh: true
  refresh_interval: 3000
  scopes:
    - https://www.googleapis.com/auth/calendar
    - https://www.googleapis.com/auth/calendar.events
  config_fields:
    - key: client_id
      label: Client ID
      type: text
      required: true
    - key: client_secret
      label: Client Secret
      type: password
      required: true
api:
  base_url: https://www.googleapis.com/calendar/v3
webhook:
  protocol: pubsub
  event_field: eventType
  supported_events:
    - sync
