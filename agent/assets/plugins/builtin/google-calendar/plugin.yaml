name: google-calendar
display_name: Google Calendar
description: View and create calendar events
version: 0.2.0

auth:
  type: oauth2
  provider: google
  token_refresh_interval: 3000
  refresh_tool: refresh_google_calendar_token
  scopes:
    - https://www.googleapis.com/auth/calendar.readonly
    - https://www.googleapis.com/auth/calendar.events
  config_fields:
    - key: account_email
      label: Google Account
      type: text
      required: false
    - key: public_base_url
      label: Public Base URL
      type: text
      required: false
      description: Your server's public URL. Set via AETHER_PUBLIC_BASE_URL env var.
    - key: pubsub_topic
      label: Google Pub/Sub Topic
      type: text
      required: false
      description: Google Cloud Pub/Sub topic. Set via GOOGLE_CLOUD_PROJECT env var.

webhook:
  protocol: http
  pubsub_topic: aether-calendar
  setup_tool: setup_calendar_watch
  handle_tool: handle_calendar_event
  renew_interval: 518400

tools:
  - class: UpcomingEventsTool
  - class: SearchEventsTool
  - class: CreateEventTool
  - class: GetEventTool
  - class: RefreshGoogleCalendarTokenTool
  - class: SetupCalendarWatchTool
