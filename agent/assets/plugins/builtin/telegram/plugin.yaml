name: telegram
display_name: Telegram
description: Send and receive Telegram messages. The agent can message you on Telegram, reply to messages, and receive incoming messages as real-time events.
version: 0.1.0
plugin_type: telephony

auth:
  type: api_key
  config_fields:
    - key: bot_token
      label: Bot Token
      type: password
      required: true
      description: Create a bot with @BotFather on Telegram and paste the token here (e.g. 123456:ABC-DEF...)
    - key: allowed_chat_ids
      label: Allowed Chat IDs (comma-separated)
      type: text
      required: false
      description: Optional. Comma-separated list of chat IDs that can send messages to the agent. Leave blank to allow any chat. Get your chat ID by messaging @userinfobot on Telegram.
    - key: secret_token
      label: Webhook Secret Token
      type: password
      required: false
      description: Optional but recommended. A random string you set when registering your webhook with Telegram (setWebhook secret_token parameter). Prevents spoofed requests.

webhook:
  protocol: http
  handle_tool: handle_telegram_event

tools:
  - class: SendMessageTool
  - class: SendPhotoTool
  - class: GetChatInfoTool
  - class: ResolveUsernameTool
  - class: HandleTelegramEventTool
  - class: SendTypingIndicatorTool
