name: brave-search
display_name: Brave Search
description: Real-time web search powered by Brave Search API. Search the live web, news, and context snippets.
version: 1.0.0

auth:
  type: api_key
  config_key: api_key
  header_name: X-Subscription-Token
  config_fields:
    - key: api_key
      label: Brave Search API Key
      type: password
      required: true
      description: Your Brave Search API key from api-dashboard.search.brave.com

api:
  base_url: https://api.search.brave.com/res/v1
