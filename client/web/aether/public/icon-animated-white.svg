<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes pulse {
        0%   { opacity: 0.5;  r: 2.5; }
        15%  { opacity: 1;    r: 3.5; }
        30%  { opacity: 0.6;  r: 2.6; }
        45%  { opacity: 0.9;  r: 3.3; }
        65%  { opacity: 0.5;  r: 2.5; }
        100% { opacity: 0.5;  r: 2.5; }
      }

      @keyframes breathe-2 {
        0%   { transform: scale(1);     }
        15%  { transform: scale(1.08);  }
        30%  { transform: scale(1.02);  }
        45%  { transform: scale(1.06);  }
        100% { transform: scale(1);     }
      }
      @keyframes breathe-3 {
        0%   { transform: scale(1);     }
        15%  { transform: scale(1.065); }
        30%  { transform: scale(1.015); }
        45%  { transform: scale(1.05);  }
        100% { transform: scale(1);     }
      }
      @keyframes breathe-4 {
        0%   { transform: scale(1);     }
        15%  { transform: scale(1.05);  }
        30%  { transform: scale(1.01);  }
        45%  { transform: scale(1.04);  }
        100% { transform: scale(1);     }
      }
      @keyframes breathe-5 {
        0%   { transform: scale(1);     }
        15%  { transform: scale(1.04);  }
        30%  { transform: scale(1.008); }
        45%  { transform: scale(1.03);  }
        100% { transform: scale(1);     }
      }
      @keyframes breathe-6 {
        0%   { transform: scale(1);     }
        15%  { transform: scale(1.03);  }
        30%  { transform: scale(1.005); }
        45%  { transform: scale(1.02);  }
        100% { transform: scale(1);     }
      }

      .level-1 { transform-origin: 100px 100px; }
      .level-2 { transform-origin: 100px 100px; animation: breathe-2 2.5s ease-in-out infinite; animation-delay: 0.08s; }
      .level-3 { transform-origin: 100px 100px; animation: breathe-3 2.5s ease-in-out infinite; animation-delay: 0.16s; }
      .level-4 { transform-origin: 100px 100px; animation: breathe-4 2.5s ease-in-out infinite; animation-delay: 0.24s; }
      .level-5 { transform-origin: 100px 100px; animation: breathe-5 2.5s ease-in-out infinite; animation-delay: 0.32s; }
      .level-6 { transform-origin: 100px 100px; animation: breathe-6 2.5s ease-in-out infinite; animation-delay: 0.40s; }

      .level-1 circle { animation: pulse 2.5s ease-in-out infinite; }
      .level-2 circle { animation: pulse 2.5s ease-in-out infinite; animation-delay: 0.08s; }
      .level-3 circle { animation: pulse 2.5s ease-in-out infinite; animation-delay: 0.16s; }
      .level-4 circle { animation: pulse 2.5s ease-in-out infinite; animation-delay: 0.24s; }
      .level-5 circle { animation: pulse 2.5s ease-in-out infinite; animation-delay: 0.32s; }
      .level-6 circle { animation: pulse 2.5s ease-in-out infinite; animation-delay: 0.40s; }
    </style>
  </defs>
  <g fill="#ffffff" filter="url(#shadow)">
    <g class="level-1">
