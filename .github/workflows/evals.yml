name: Reliability Evals

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "agent/**"
      - "dashboard/**"
      - "evals/**"
      - "docs/reliability-v1.md"
      - ".github/workflows/evals.yml"

jobs:
  evals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Run golden evals
        working-directory: dashboard
        run: npm run eval:run -- --suite golden --format json --output ../.tmp/evals/latest.json

      - name: Diff against baseline
        working-directory: dashboard
        run: npm run eval:diff -- --baseline ../.ci/evals/baseline.json --current ../.tmp/evals/latest.json --output ../.tmp/evals/diff.json

      - name: Enforce reliability gates
        working-directory: dashboard
        run: npm run eval:gate -- --input ../.tmp/evals/latest.json --min-success-rate 0.95 --max-missing-required-tool-rate 0.02 --max-out-of-bounds-rate 0.00 --min-recovery-rate 0.90
