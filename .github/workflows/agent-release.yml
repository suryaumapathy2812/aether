name: Release - Agent Artifacts

on:
  push:
    tags:
      - "agent-v*"

jobs:
  release-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#agent-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod

      - name: Build and package linux/amd64
        working-directory: agent
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist/amd64/assets
          go build -ldflags "-X github.com/suryaumapathy2812/core-ai/agent/internal/buildinfo.Version=${{ steps.meta.outputs.version }} -X github.com/suryaumapathy2812/core-ai/agent/internal/buildinfo.Commit=${GITHUB_SHA} -X github.com/suryaumapathy2812/core-ai/agent/internal/buildinfo.BuildTime=${{ steps.meta.outputs.build_time }}" -o dist/amd64/agent-server ./cmd/server
          cp assets/PROMPT.md dist/amd64/assets/PROMPT.md
          mkdir -p dist/amd64/assets/skills dist/amd64/assets/plugins
          cp -R assets/skills/builtin dist/amd64/assets/skills/builtin
          cp -R assets/plugins/builtin dist/amd64/assets/plugins/builtin
          tar -C dist/amd64 -czf ../aether-agent-v${{ steps.meta.outputs.version }}-linux-amd64.tar.gz agent-server assets

      - name: Build and package linux/arm64
        working-directory: agent
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist/arm64/assets
          go build -ldflags "-X github.com/suryaumapathy2812/core-ai/agent/internal/buildinfo.Version=${{ steps.meta.outputs.version }} -X github.com/suryaumapathy2812/core-ai/agent/internal/buildinfo.Commit=${GITHUB_SHA} -X github.com/suryaumapathy2812/core-ai/agent/internal/buildinfo.BuildTime=${{ steps.meta.outputs.build_time }}" -o dist/arm64/agent-server ./cmd/server
          cp assets/PROMPT.md dist/arm64/assets/PROMPT.md
          mkdir -p dist/arm64/assets/skills dist/arm64/assets/plugins
          cp -R assets/skills/builtin dist/arm64/assets/skills/builtin
          cp -R assets/plugins/builtin dist/arm64/assets/plugins/builtin
          tar -C dist/arm64 -czf ../aether-agent-v${{ steps.meta.outputs.version }}-linux-arm64.tar.gz agent-server assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/aether-agent-v${{ steps.meta.outputs.version }}-linux-amd64.tar.gz
            agent/aether-agent-v${{ steps.meta.outputs.version }}-linux-arm64.tar.gz
          generate_release_notes: true
