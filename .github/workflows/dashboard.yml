# Aether Dashboard - Build and Push to Docker Hub
#
# Builds the Next.js dashboard with bun and pushes to Docker Hub.
# Trigger: push to main branch.

name: Build & Deploy - Dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard.yml'

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get Git info
        id: git
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-dashboard-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-dashboard-

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          platforms: |
            linux/amd64
            linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/aether-dashboard:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/aether-dashboard:${{ steps.git.outputs.sha_short }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Move Docker cache
        if: success()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Redeploy Portainer Stack
        if: success()
        run: |
          # Get the stack ID by name
          STACK_ID=$(curl -s \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_KEY }}" \
            "${{ secrets.PORTAINER_URL }}/api/stacks" \
            | jq -r '.[] | select(.Name=="${{ secrets.PORTAINER_STACK_NAME }}") | .Id')

          if [ -z "$STACK_ID" ] || [ "$STACK_ID" = "null" ]; then
            echo "::warning::Stack '${{ secrets.PORTAINER_STACK_NAME }}' not found in Portainer — skipping redeploy"
            exit 0
          fi

          # Get the stack's endpoint ID
          ENDPOINT_ID=$(curl -s \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_KEY }}" \
            "${{ secrets.PORTAINER_URL }}/api/stacks/$STACK_ID" \
            | jq -r '.EndpointId')

          # Trigger stack redeploy (pulls latest images)
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"pullImage": true, "prune": false}' \
            "${{ secrets.PORTAINER_URL }}/api/stacks/$STACK_ID/git/redeploy?endpointId=$ENDPOINT_ID")

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Portainer stack redeployed successfully (stack=$STACK_ID, endpoint=$ENDPOINT_ID)"
          else
            echo "::warning::Portainer redeploy returned HTTP $HTTP_STATUS — stack may need manual update"
          fi
