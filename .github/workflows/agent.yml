# Aether Agent - Build and Push to Docker Hub
#
# Builds the Go agent and pushes to Docker Hub.
# Trigger: push to main branch.

name: Build & Deploy - Agent

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/agent.yml'

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get Git info
        id: git
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-agent-${{ hashFiles('agent/go.mod', 'agent/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-buildx-agent-

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/aether-agent:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/aether-agent:${{ steps.git.outputs.sha_short }}
          build-args: |
            VERSION=${{ steps.git.outputs.sha_short }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.git.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
